<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro e Inicio de Sesión</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .tab {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .tab button {
            padding: 10px 20px;
            background-color: #5cb85c;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 4px;
        }
        .tab button.active {
            background-color: #4cae4c;
        }
        .tab button:hover {
            background-color: #4cae4c;
        }
        .form-content {
            display: none;
        }
        .form-content.active {
            display: block;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        input[type="submit"]:hover {
            background-color: #4cae4c;
        }
    </style>
    <script>
        function showForm(formId) {
            var forms = document.getElementsByClassName('form-content');
            for (var i = 0; i < forms.length; i++) {
                forms[i].classList.remove('active');
            }
            document.getElementById(formId).classList.add('active');

            var buttons = document.getElementsByClassName('tab-button');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            document.getElementById('btn-' + formId).classList.add('active');
        }
    </script>
</head>
<body>

<div class="container">
    <h2>Registro e Inicio de Sesión</h2>
    
    <!-- Pestañas para alternar entre Registro e Inicio de Sesión -->
    <div class="tab">
        <button class="tab-button active" id="btn-registro" onclick="showForm('registro')">Registro</button>
        <button class="tab-button" id="btn-login" onclick="showForm('login')">Inicio de Sesión</button>
    </div>
    
    <!-- Formulario de Registro -->
    <div id="registro" class="form-content active">
        <form action="procesar_registro.php" method="post">
            <label for="nombre_usuario_registro">Nombre de Usuario:</label>
            <input type="text" id="nombre_usuario_registro" name="nombre_usuario" required>

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" required>

            <label for="password_registro">Contraseña:</label>
            <input type="password" id="password_registro" name="password" required>

            <input type="submit" value="Registrar">
        </form>
    </div>

    <!-- Formulario de Inicio de Sesión -->
    <div id="login" class="form-content">
        <form action="procesar_login.php" method="post">
            <label for="nombre_usuario_login">Nombre de Usuario:</label>
            <input type="text" id="nombre_usuario_login" name="nombre_usuario" required>

            <label for="password_login">Contraseña:</label>
            <input type="password" id="password_login" name="password" required>

            <input type="submit" value="Iniciar Sesión">
        </form>
    </div>
</div>

</body>
</html>
